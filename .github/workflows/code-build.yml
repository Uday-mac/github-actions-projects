name: Build WF
on:
  push:
    branches:
      - main
jobs:
  Build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./01.code-build/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: BuildCode
        run: mvn install

  Testing:
    needs: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./01.code-build/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TestingCode
        run: mvn test
      
      - name: checkstyle
        run: mvn checkstyle:check
        