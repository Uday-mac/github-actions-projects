name: vprofile CICD WorkFlow
on:
  push:
    branches:
      - main
    paths:
      - "01.Code-build/**"
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" #runs the pipeline at scheduled


permissions:
  contents: read

    
jobs:
  Build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: 01.Code-build/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: BuildCode
        run: mvn install
      
      - name: dowload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile
          path: 01.Code-build/target/*.war

      - name: Notify if build is failed
        if: failure()
        run: echo "build failed"

  Testing:
    needs: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: 01.Code-build/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TestingCode
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: skipping the test steps
        if: github.ref != 'refs/heads/main'
        run: echo "skipping the test steps"

  code_scanning:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        shell: bash
        working-directory: 01.Code-build/
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: code scanning
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          exit-code: 0
          vuln-type: 'os,library'
          output: 'trivy-results.json'

      - name: upload trivy scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: 01.Code-build/trivy-results.json
        