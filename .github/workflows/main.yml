name: Build and push to ECR
on:
  push:
    branches:
      - ecr
  workflow_dispatch:

env:
  ECR_REPO: docker/vprofile-actions
permissions:
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Build artifact
        run: mvn install

      - name: Build failed
        if: failure()
        run: echo "Build failed"

      - name: upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war
  Test:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Test
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Skipping Test steps
        if: github.ref != 'refs/heads/main'
        run: echo "skipping test steps"

  Scan:
    runs-on: ubuntu-latest
    needs: [Build,Test]
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: 0
          format: 'json'
          vuln-type: 'os,library'
          output: 'trivy-results.json'

  Aws-config-login-ecr:
    runs-on: ubuntu-latest
    environment: Dev
    needs: [Build, Test, Scan]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Login into ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}

  Build-push:
    runs-on: ubuntu-latest
    needs: [Build, Test, Scan,Aws-config-login-ecr]
    env:
      ECR_REGISTRY: ${{ needs.Aws-config-login-ecr.outputs.registry }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Building and pushing the docker image
        run: |
          docker build -f Docker/Dockerfile -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
